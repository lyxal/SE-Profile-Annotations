name: Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for source code changes
        id: code-check
        run: |
          # Prevent infinite loop from the bot's own commits
          if [[ "$(git log -1 --pretty=%B)" == *"chore: build output"* ]]; then
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "Bot commit detected - skipping"
            exit 0
          fi

          # For the first commit, always build
          if ! git rev-parse HEAD~1 >/dev/null 2>&1; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "First commit - building"
            exit 0
          fi

          # Get list of changed files between HEAD~1 and HEAD
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Filter out docs, build artifacts, and workflow/github config files
          SOURCE_CHANGES=$(echo "$CHANGED_FILES" | grep -v -E '(README\.md|\.md$|dist/|build/|\.github/)' || true)
          # Clean up empty lines
          SOURCE_CHANGES=$(echo "$SOURCE_CHANGES" | xargs)

          if [ -n "$SOURCE_CHANGES" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Source code changes detected: $SOURCE_CHANGES"
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No source code changes (only docs/build/github files changed)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Bump version
        if: steps.code-check.outputs.has-changes == 'true'
        run: node bump-version.js

      - name: Run rollup
        if: steps.code-check.outputs.has-changes == 'true'
        run: npx rollup -c

      - name: Commit and push changes
        if: steps.code-check.outputs.has-changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: build output" || echo "No changes to commit"
          git push
