name: Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: code-check
        run: |
          # Compare current HEAD against main branch to detect actual code changes
          # This avoids false positives from the auto-commit cycle
          CHANGED_FILES=$(git diff origin/main...HEAD --name-only 2>/dev/null | grep -v -E '(package-lock.json|dist/|build/|header.txt|README.md)$' || echo "")

          if [ -n "$CHANGED_FILES" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Changed source files detected: $CHANGED_FILES"
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No source code changes detected"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Bump version
        if: steps.code-check.outputs.has-changes == 'true'
        run: node bump-version.js

      - name: Run rollup
        if: steps.code-check.outputs.has-changes == 'true'
        run: npx rollup -c

      - name: Commit and push changes
        if: steps.code-check.outputs.has-changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: build output" || echo "No changes to commit"
          git push
