name: Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for source code changes
        id: code-check
        run: |
          # Get list of changed files in this push
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            CHANGED_FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1 2>/dev/null || echo "")
          else
            # For push events, compare with the previous commit
            CHANGED_FILES=$(git diff --name-only HEAD~1 2>/dev/null || echo "")
          fi

          # Filter to only source code files (exclude docs, build artifacts, lock files)
          SOURCE_CHANGES=$(echo "$CHANGED_FILES" | grep -v -E '(README\.md|package-lock\.json|\.md$|dist/|build/|header\.txt)' || echo "")

          if [ -n "$SOURCE_CHANGES" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            echo "Source code changes detected"
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
            echo "No source code changes (only docs/build files changed)"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Bump version
        if: steps.code-check.outputs.has-changes == 'true'
        run: node bump-version.js

      - name: Run rollup
        if: steps.code-check.outputs.has-changes == 'true'
        run: npx rollup -c

      - name: Commit and push changes
        if: steps.code-check.outputs.has-changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: build output" || echo "No changes to commit"
          git push
