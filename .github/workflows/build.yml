name: Build and Push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for code changes
        id: code-check
        run: |
          # Check if this is the first commit
          if ! git rev-parse HEAD~1 2>/dev/null; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get all changed files
          ALL_CHANGED=$(git diff HEAD~1..HEAD --name-only)

          # Filter out documentation and build artifacts
          CHANGED_FILES=$(echo "$ALL_CHANGED" | grep -v -E '(package-lock.json|dist/|build/|header.txt|README.md)$')

          if [ -n "$CHANGED_FILES" ]; then
            echo "has-changes=true" >> $GITHUB_OUTPUT
          else
            echo "has-changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Bump version
        if: steps.code-check.outputs.has-changes == 'true'
        run: node bump-version.js

      - name: Run rollup
        if: steps.code-check.outputs.has-changes == 'true'
        run: npx rollup -c

      - name: Commit and push changes
        if: steps.code-check.outputs.has-changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git commit -m "chore: build output" || echo "No changes to commit"
          git push
